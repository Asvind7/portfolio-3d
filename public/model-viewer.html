<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Model Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
  #bg { position: absolute; inset: 0; }
  canvas { position: absolute; inset: 0; display: block; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="c"></canvas>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const params = new URLSearchParams(location.search);
const model = params.get('model') || 'astranaut';

const MODEL_CONFIG = {
  astranaut: {
    url: '/projects/character/astranaut/astranaut.glb',
    bg: 'radial-gradient(ellipse at 70% 40%, #0d1b3e 0%, #030718 40%, #0a0a1a 100%)',
    camPos: [0, 0.5, 4],
    target: [0, 0.3, 0],
    rimColor: '#00C4FF',
    rimIntensity: 1.2,
    fillColor: '#7B2FFF',
  },
  asvind: {
    url: '/projects/character/asvind/asvind.glb',
    bg: 'radial-gradient(ellipse at 30% 60%, #001a1a 0%, #020d12 50%, #030a08 100%)',
    camPos: [0, 0.5, 4],
    target: [0, 0.3, 0],
    rimColor: '#00FFA8',
    rimIntensity: 1.0,
    fillColor: '#005533',
  },
  miles: {
    url: '/projects/character/miles/miles_character.glb',
    bg: 'radial-gradient(ellipse at 50% 50%, #1a0010 0%, #0d0008 50%, #050002 100%)',
    camPos: [0, 0.5, 4],
    target: [0, 0.3, 0],
    rimColor: '#FF2244',
    rimIntensity: 1.5,
    fillColor: '#440011',
  },
};

const config = MODEL_CONFIG[model] || MODEL_CONFIG.astranaut;

// Set background
document.getElementById('bg').style.background = config.bg;

const W = 1920, H = 1080;
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
camera.position.set(...config.camPos);

// Lighting rig
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
keyLight.position.set(4, 8, 5);
keyLight.castShadow = true;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(config.rimColor, config.rimIntensity);
rimLight.position.set(-4, 3, -3);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(config.fillColor, 0.8);
fillLight.position.set(3, 1, 3);
scene.add(fillLight);

const bottomFill = new THREE.HemisphereLight(0x112244, 0x000000, 0.4);
scene.add(bottomFill);

const controls = new OrbitControls(camera, canvas);
controls.target.set(...config.target);
controls.enableZoom = false;
controls.enablePan = false;
controls.update();

// Load model
const loader = new GLTFLoader();
loader.load(config.url, (gltf) => {
  const obj = gltf.scene;

  // Center & scale to fit frame nicely
  const box = new THREE.Box3().setFromObject(obj);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  // Scale so character fits ~60% of vertical FOV
  const scale = 2.8 / maxDim;
  obj.scale.setScalar(scale);
  // Center horizontally, keep vertical center around chest
  obj.position.x = -center.x * scale;
  obj.position.y = -center.y * scale + 0.15;
  obj.position.z = -center.z * scale;

  // Enable shadows on all meshes
  obj.traverse(node => {
    if (node.isMesh) {
      node.castShadow = true;
      node.receiveShadow = true;
    }
  });

  scene.add(obj);
  window.__MODEL_READY__ = true;
  document.title = 'READY:' + model;
  console.log('MODEL_READY');
}, undefined, (err) => {
  console.error('Load error:', err);
  window.__MODEL_READY__ = true;
  document.title = 'ERROR:' + model;
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
